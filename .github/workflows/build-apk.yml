name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify Android SDK
        run: |
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          echo "SDK path: $SDK"
          echo "sdk.dir=$SDK" > local.properties
          ls "$SDK/platforms/" || echo "WARNING: no platforms"
          ls "$SDK/build-tools/" || echo "WARNING: no build-tools"

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: List APK output
        run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eco-advisior-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
